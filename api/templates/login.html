<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Effexor Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: rgb(26, 26, 30); }
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear { display: none; }

        /* Toast */
        #toastContainer {
            position:fixed; top:1.25rem; right:1rem; z-index:9999;
            display:flex; flex-direction:column; gap:0.5rem;
            max-width:22rem; width:calc(100vw - 2rem); pointer-events:none;
        }
        .toast {
            background:rgb(28,28,32); border:1px solid rgba(255,255,255,0.07);
            border-radius:0.875rem; box-shadow:0 8px 24px rgba(0,0,0,0.4);
            padding:0.875rem 1rem; display:flex; align-items:flex-start; gap:0.75rem;
            transform:translateX(120%); position:relative; overflow:hidden;
            transition:transform 0.35s cubic-bezier(0.34,1.4,0.64,1);
            pointer-events:all; cursor:pointer;
        }
        .toast.show { transform:translateX(0); }
        .toast.hide { transform:translateX(120%); }
        .toast-icon {
            width:2rem; height:2rem; border-radius:50%;
            display:flex; align-items:center; justify-content:center; flex-shrink:0;
        }
        .toast-success .toast-icon { background:rgba(34,197,94,0.15); color:#4ade80; }
        .toast-error .toast-icon { background:rgba(239,68,68,0.15); color:#f87171; }
        .toast-info .toast-icon { background:rgba(49,120,136,0.2); color:#5eead4; }
        .toast-title { font-size:0.875rem; font-weight:600; color:#e5e7eb; }
        .toast-msg { font-size:0.8125rem; color:#9ca3af; margin-top:0.125rem; }
        .toast-bar {
            position:absolute; bottom:0; left:0; height:2px;
            background:linear-gradient(90deg,#21525D,#317888);
            animation:toastBarS linear forwards;
        }
        @keyframes toastBarS { from{width:100%} to{width:0%} }

        /* PIN Modal */
        #pinModal {
            display:none;
            position:fixed; inset:0; z-index:10000;
            align-items:center; justify-content:center; padding:1rem;
            background:rgba(0,0,0,0.75); backdrop-filter:blur(6px);
        }
        #pinModal.open { display:flex; }
        #pinModal .pin-card {
            background:rgb(22,22,26); border:1px solid rgba(255,255,255,0.08);
            border-radius:1.25rem; padding:2rem 1.75rem; width:100%; max-width:320px;
            box-shadow:0 24px 64px rgba(0,0,0,0.6);
            animation:pinIn 0.28s cubic-bezier(0.34,1.4,0.64,1);
        }
        @keyframes pinIn { from{opacity:0;transform:scale(0.88)} to{opacity:1;transform:scale(1)} }
        .pin-dot {
            width:14px; height:14px; border-radius:50%;
            border:2px solid rgba(255,255,255,0.2);
            background:transparent; transition:all 0.15s;
        }
        .pin-dot.filled {
            background:linear-gradient(135deg,#21525D,#317888);
            border-color:#317888;
            box-shadow:0 0 8px rgba(49,120,136,0.6);
        }
        .pin-dot.error {
            background:rgba(239,68,68,0.8);
            border-color:#ef4444;
            box-shadow:0 0 8px rgba(239,68,68,0.5);
        }
        .pin-key {
            width:5rem; height:5rem; border-radius:0.875rem;
            background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07);
            color:#e5e7eb; font-size:1.375rem; font-weight:600;
            cursor:pointer; transition:background 0.08s, transform 0.08s, border-color 0.08s;
            user-select:none; touch-action:manipulation;
            -webkit-tap-highlight-color:transparent;
            display:flex; align-items:center; justify-content:center;
        }
        .pin-key:hover { background:rgba(49,120,136,0.18); border-color:rgba(49,120,136,0.4); }
        .pin-key:active, .pin-key.pressed { transform:scale(0.91); background:rgba(49,120,136,0.32); border-color:rgba(49,120,136,0.5); }
        .pin-key.backspace { color:#9ca3af; font-size:1rem; }
        .pin-key.empty { pointer-events:none; background:transparent; border:none; }
        @keyframes pinShake {
            0%,100%{transform:translateX(0)}
            20%{transform:translateX(-8px)}
            40%{transform:translateX(8px)}
            60%{transform:translateX(-6px)}
            80%{transform:translateX(6px)}
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background-color: rgb(26, 26, 30);">
    <div id="toastContainer"></div>
    <div class="relative rounded-2xl shadow-2xl p-8 w-full max-w-md" style="background-color: rgb(18, 18, 20);">
        <!-- Logo -->
        <div class="flex items-center justify-center mb-6">
            <div class="bg-gradient-to-br from-[#21525D] to-[#317888] p-3 rounded-xl shadow-lg">
                <svg class="w-10 h-10 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
        </div>

        <h1 class="text-3xl font-bold text-center mb-2 bg-gradient-to-r from-[#317888] to-[#447F8E] bg-clip-text text-transparent">Welcome Back</h1>
        <p class="text-center text-gray-400 mb-8">Sign in to access your content</p>
        
        <!-- Login Form -->
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">Username or Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        class="w-full pl-10 pr-4 py-3 border-2 border-gray-600 rounded-xl focus:ring-2 focus:ring-[#317888] focus:border-transparent transition bg-gray-800/50 text-gray-200 placeholder-gray-500"
                        placeholder="Enter your username or email"
                    />
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </div>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        class="w-full pl-10 pr-12 py-3 border-2 border-gray-600 rounded-xl focus:ring-2 focus:ring-[#317888] focus:border-transparent transition bg-gray-800/50 text-gray-200 placeholder-gray-500"
                        placeholder="Enter your password"
                    />
                    <button
                        type="button"
                        onclick="togglePasswordVisibility('password', 'togglePasswordIcon')"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-200 transition"
                    >
                        <svg id="togglePasswordIcon" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="flex items-center justify-end">
                <button type="button" onclick="showForgotPassword()" class="text-sm text-[#317888] hover:text-[#447F8E] font-semibold">
                    Forgot Password?
                </button>
            </div>
            
            <div id="errorMessage" class="hidden bg-red-500/20 border-l-4 border-red-500 p-3 rounded">
                <div class="flex items-center">
                    <svg class="w-5 h-5 text-red-400 mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <p class="text-red-400 text-sm font-medium" id="errorText"></p>
                </div>
            </div>
            
            <button
                type="submit"
                class="w-full bg-gradient-to-r from-[#21525D] to-[#317888] text-white py-3 rounded-xl font-semibold hover:from-[#1A1A1E] hover:to-[#21525D] transition transform hover:scale-[1.02] shadow-lg hover:shadow-xl"
            >
                Sign In
            </button>
        </form>

        <!-- Forgot Password Form (Hidden by default) -->
        <div id="forgotPasswordForm" class="hidden space-y-5">
            <div class="text-center mb-6">
                <button onclick="showLogin()" class="inline-flex items-center text-sm text-gray-400 hover:text-gray-300 mb-4">
                    <svg class="w-4 h-4 mr-1" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Back to Login
                </button>
                <h3 class="text-xl font-bold text-gray-200 mb-2">Reset Password</h3>
                <p class="text-sm text-gray-400">Enter your email to receive a reset code</p>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <input
                        type="email"
                        id="resetEmail"
                        required
                        class="w-full pl-10 pr-4 py-3 border-2 border-gray-600 rounded-xl focus:ring-2 focus:ring-[#317888] focus:border-transparent transition bg-gray-800/50 text-gray-200 placeholder-gray-500"
                        placeholder="Enter your email"
                    />
                </div>
            </div>

            <button
                onclick="sendResetCode()"
                class="w-full bg-gradient-to-r from-[#21525D] to-[#317888] text-white py-3 rounded-xl font-semibold hover:from-[#1A1A1E] hover:to-[#21525D] transition transform hover:scale-[1.02] shadow-lg hover:shadow-xl"
            >
                Send Reset Code
            </button>
        </div>

        <!-- Reset Password Form (Hidden by default) -->
        <div id="resetPasswordForm" class="hidden space-y-5">
            <div class="text-center mb-6">
                <button onclick="showForgotPassword()" class="inline-flex items-center text-sm text-gray-400 hover:text-gray-300 mb-4">
                    <svg class="w-4 h-4 mr-1" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Back
                </button>
                <div class="inline-flex items-center justify-center w-16 h-16 bg-[#317888]/20 rounded-full mb-4">
                    <svg class="w-8 h-8 text-[#317888]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-gray-200 mb-2">Enter Reset Code</h3>
                <p class="text-sm text-gray-400">Check your email for the 6-digit code</p>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">Verification Code</label>
                <input
                    type="text"
                    id="resetCode"
                    maxlength="6"
                    pattern="[0-9]{6}"
                    class="w-full px-4 py-3 border-2 border-gray-600 rounded-xl focus:ring-2 focus:ring-[#317888] focus:border-transparent transition bg-gray-800/50 text-gray-200 placeholder-gray-500 text-center text-2xl tracking-widest font-mono"
                    placeholder="000000"
                />
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">New Password</label>
                <div class="relative">
                    <input
                        type="password"
                        id="newPassword"
                        minlength="6"
                        required
                        class="w-full px-4 pr-12 py-3 border-2 border-gray-600 rounded-xl focus:ring-2 focus:ring-[#317888] focus:border-transparent transition bg-gray-800/50 text-gray-200 placeholder-gray-500"
                        placeholder="Enter new password"
                    />
                    <button
                        type="button"
                        onclick="togglePasswordVisibility('newPassword', 'toggleNewPasswordIcon')"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-200 transition"
                    >
                        <svg id="toggleNewPasswordIcon" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">Confirm New Password</label>
                <div class="relative">
                    <input
                        type="password"
                        id="confirmNewPassword"
                        required
                        class="w-full px-4 pr-12 py-3 border-2 border-gray-600 rounded-xl focus:ring-2 focus:ring-[#317888] focus:border-transparent transition bg-gray-800/50 text-gray-200 placeholder-gray-500"
                        placeholder="Confirm new password"
                    />
                    <button
                        type="button"
                        onclick="togglePasswordVisibility('confirmNewPassword', 'toggleConfirmPasswordIcon')"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-200 transition"
                    >
                        <svg id="toggleConfirmPasswordIcon" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <div id="resetErrorMessage" class="hidden bg-red-500/20 border-l-4 border-red-500 p-3 rounded">
                <div class="flex items-center">
                    <svg class="w-5 h-5 text-red-400 mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <p class="text-red-400 text-sm font-medium" id="resetErrorText"></p>
                </div>
            </div>

            <button
                onclick="resetPassword()"
                class="w-full bg-gradient-to-r from-[#21525D] to-[#317888] text-white py-3 rounded-xl font-semibold hover:from-[#1A1A1E] hover:to-[#21525D] transition transform hover:scale-[1.02] shadow-lg hover:shadow-xl"
            >
                Reset Password
            </button>
        </div>
        
        <div id="registerLink" class="mt-6 text-center">
            <p class="text-gray-400 text-sm">
                Don't have an account? 
                <a href="/register" class="text-[#317888] hover:text-[#447F8E] font-semibold hover:underline">Create one</a>
            </p>
        </div>
        <!-- Message Box
        <div class="mt-8 p-4 bg-gradient-to-br from-[#21525D]/10 to-[#317888]/10 rounded-xl border border-[#317888]/30">
            <p class="text-xs font-semibold text-[#317888] mb-2">Message title</p>
            <div class="space-y-1 text-xs text-[#447F8E]">
                <div class="flex items-center gap-2">
                    <span class="font-semibold">Message description</span>
                    <code class="bg-gray-800/50 px-2 py-0.5 rounded">code block</code>
                </div>
            </div>
        </div>
        -->
    </div>

    <!-- PIN Modal -->
    <div id="pinModal">
        <div class="pin-card">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-gradient-to-br from-[#21525D] to-[#317888] mb-3 shadow-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                </div>
                <h2 class="text-lg font-bold text-gray-100">Quick Access</h2>
                <p class="text-xs text-gray-500 mt-1">Enter PIN to sign in</p>
            </div>

            <!-- PIN dots -->
            <div class="flex justify-center gap-4 mb-7" id="pinDots">
                <div class="pin-dot" id="dot0"></div>
                <div class="pin-dot" id="dot1"></div>
                <div class="pin-dot" id="dot2"></div>
                <div class="pin-dot" id="dot3"></div>
            </div>

            <!-- Numpad -->
            <div class="grid grid-cols-3 gap-2.5 justify-items-center" id="pinPad">
                <button class="pin-key" data-digit="1">1</button>
                <button class="pin-key" data-digit="2">2</button>
                <button class="pin-key" data-digit="3">3</button>
                <button class="pin-key" data-digit="4">4</button>
                <button class="pin-key" data-digit="5">5</button>
                <button class="pin-key" data-digit="6">6</button>
                <button class="pin-key" data-digit="7">7</button>
                <button class="pin-key" data-digit="8">8</button>
                <button class="pin-key" data-digit="9">9</button>
                <button class="pin-key empty" aria-hidden="true"></button>
                <button class="pin-key" data-digit="0">0</button>
                <button class="pin-key backspace" data-action="backspace" title="Delete">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z"/></svg>
                </button>
            </div>

            <button onclick="closePinModal()" class="mt-5 w-full py-2 rounded-xl text-xs text-gray-600 hover:text-gray-400 transition">Cancel</button>
        </div>
    </div>

    <script>
        // Toast system
        function showToast(message, type='info', duration=4000) {
            let c = document.getElementById('toastContainer');
            if (!c) { c = document.createElement('div'); c.id='toastContainer'; document.body.appendChild(c); }
            const icons = {
                success:'<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>',
                error:'<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>',
                info:'<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
            };
            const titles = {success:'Success', error:'Error', info:'Info'};
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.innerHTML = `<div class="toast-icon">${icons[type]||icons.info}</div><div class="flex-1 min-w-0"><div class="toast-title">${titles[type]||'Notice'}</div><div class="toast-msg">${message}</div></div><div class="toast-bar" style="animation-duration:${duration}ms"></div>`;
            t.addEventListener('click', ()=>{ t.classList.add('hide'); setTimeout(()=>t.remove(),350); });
            c.appendChild(t);
            requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
            setTimeout(()=>{ t.classList.add('hide'); setTimeout(()=>t.remove(),350); }, duration);
        }

        let resetEmailAddress = null;

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/';
                } else {
                    errorText.textContent = data.message || 'Invalid credentials';
                    errorMessage.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error:', error);
                errorText.textContent = 'An error occurred. Please try again.';
                errorMessage.classList.remove('hidden');
            }
        });

        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('forgotPasswordForm').classList.add('hidden');
            document.getElementById('resetPasswordForm').classList.add('hidden');
            document.getElementById('registerLink').classList.remove('hidden');
        }

        function showForgotPassword() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('forgotPasswordForm').classList.remove('hidden');
            document.getElementById('resetPasswordForm').classList.add('hidden');
            document.getElementById('registerLink').classList.add('hidden');
        }

        function showResetPassword() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('forgotPasswordForm').classList.add('hidden');
            document.getElementById('resetPasswordForm').classList.remove('hidden');
            document.getElementById('registerLink').classList.add('hidden');
        }

        async function sendResetCode() {
            const email = document.getElementById('resetEmail').value;
            if (!email) { showToast('Please enter your email', 'error'); return; }
            try {
                const response = await fetch('/forgot-password', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                if (data.success) {
                    resetEmailAddress = email;
                    showResetPassword();
                    showToast('Reset code sent! Check your email.', 'success');
                } else {
                    showToast(data.message || 'Failed to send reset code', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('An error occurred. Please try again.', 'error');
            }
        }

        async function resetPassword() {
            const code = document.getElementById('resetCode').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmNewPassword = document.getElementById('confirmNewPassword').value;
            const errorMessage = document.getElementById('resetErrorMessage');
            const errorText = document.getElementById('resetErrorText');

            if (code.length !== 6) {
                errorText.textContent = 'Please enter a 6-digit code';
                errorMessage.classList.remove('hidden'); return;
            }
            if (newPassword !== confirmNewPassword) {
                errorText.textContent = 'Passwords do not match';
                errorMessage.classList.remove('hidden'); return;
            }
            if (newPassword.length < 6) {
                errorText.textContent = 'Password must be at least 6 characters';
                errorMessage.classList.remove('hidden'); return;
            }

            try {
                const response = await fetch('/reset-password', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: resetEmailAddress, code, new_password: newPassword })
                });
                const data = await response.json();
                if (data.success) {
                    showToast('Password reset successfully! Please log in.', 'success');
                    showLogin();
                    document.getElementById('resetCode').value='';
                    document.getElementById('newPassword').value='';
                    document.getElementById('confirmNewPassword').value='';
                } else {
                    errorText.textContent = data.message || 'Invalid or expired code';
                    errorMessage.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error:', error);
                errorText.textContent = 'An error occurred. Please try again.';
                errorMessage.classList.remove('hidden');
            }
        }

        document.getElementById('resetCode')?.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
            }
        }

        // ── Quick-access PIN ─────────────────────────────────────────────
        // Values injected server-side from environment variables
        const PIN_CODE     = {{ quick_pin_code     | tojson }};
        const PIN_USERNAME = {{ quick_pin_username | tojson }};
        const PIN_PASSWORD = {{ quick_pin_password | tojson }};
        const PIN_SEQUENCE = {{ quick_pin_sequence | tojson }};

        let _seqBuf = '';
        let _pinEntry = '';
        let _pinLocked = false;

        // Only activate triggers if a PIN has been configured server-side
        const PIN_ENABLED = PIN_CODE && PIN_CODE.length > 0;

        // Listen for the key sequence when focus is NOT on an input
        if (PIN_ENABLED) document.addEventListener('keydown', e => {
            const tag = document.activeElement?.tagName;
            if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
            if (e.key.length !== 1) return;
            _seqBuf += e.key.toLowerCase();
            if (_seqBuf.length > PIN_SEQUENCE.length) _seqBuf = _seqBuf.slice(-PIN_SEQUENCE.length);
            if (_seqBuf === PIN_SEQUENCE) {
                _seqBuf = '';
                openPinModal();
            }
        });

        // Also support number keys while PIN modal is open
        document.addEventListener('keydown', e => {
            if (!document.getElementById('pinModal').classList.contains('open')) return;
            if (e.key >= '0' && e.key <= '9') { pinKey(e.key); }
            if (e.key === 'Backspace') { pinBackspace(); }
            if (e.key === 'Escape') { closePinModal(); }
        });

        // ── Mobile trigger: double-tap then swipe up ─────────────────────
        // Phase 1: detect two taps within 400ms on a non-input element
        // Phase 2: within 600ms of the second tap, detect an upward swipe of 60px+
        let _tapCount = 0;
        let _tapTimer = null;
        let _awaitingSwipe = false;
        let _swipeTouchY = null;
        let _swipeTimer = null;

        if (PIN_ENABLED) document.addEventListener('touchstart', e => {
            // Ignore taps on inputs, buttons, links
            const tag = e.target.tagName;
            if (['INPUT','BUTTON','A','SELECT','TEXTAREA'].includes(tag)) return;
            // Ignore if PIN modal already open
            if (document.getElementById('pinModal').classList.contains('open')) return;

            _tapCount++;
            clearTimeout(_tapTimer);

            if (_tapCount === 1) {
                // Wait for possible second tap
                _tapTimer = setTimeout(() => { _tapCount = 0; _awaitingSwipe = false; }, 400);
            } else if (_tapCount >= 2) {
                // Double-tap confirmed — now wait for swipe up
                _tapCount = 0;
                clearTimeout(_tapTimer);
                _awaitingSwipe = true;
                _swipeTouchY = e.touches[0].clientY;
                clearTimeout(_swipeTimer);
                _swipeTimer = setTimeout(() => { _awaitingSwipe = false; _swipeTouchY = null; }, 600);
            }
        }, {passive: true});

        if (PIN_ENABLED) document.addEventListener('touchmove', e => {
            if (!_awaitingSwipe || _swipeTouchY === null) return;
            const dy = _swipeTouchY - e.touches[0].clientY; // positive = swiped up
            if (dy >= 60) {
                _awaitingSwipe = false;
                _swipeTouchY = null;
                clearTimeout(_swipeTimer);
                openPinModal();
            }
        }, {passive: true});

        function openPinModal() {
            _pinEntry = '';
            _pinLocked = false;
            renderPinDots();
            document.getElementById('pinModal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closePinModal() {
            document.getElementById('pinModal').classList.remove('open');
            document.body.style.overflow = '';
            _pinEntry = '';
            _pinLocked = false;
            renderPinDots();
        }

        function pinKey(digit) {
            if (_pinLocked || _pinEntry.length >= 4) return;
            _pinEntry += digit;
            renderPinDots();
            if (_pinEntry.length === 4) {
                _pinLocked = true;
                setTimeout(() => checkPin(), 180);
            }
        }

        function pinBackspace() {
            if (_pinLocked) return;
            _pinEntry = _pinEntry.slice(0, -1);
            renderPinDots();
        }

        function _dispatchPinBtn(btn) {
            var digit = btn.dataset.digit;
            var action = btn.dataset.action;
            if (digit !== undefined) pinKey(digit);
            else if (action === 'backspace') pinBackspace();
        }

        // touchstart fires immediately, no 300ms delay
        document.getElementById('pinPad').addEventListener('touchstart', function(e) {
            var btn = e.target.closest ? e.target.closest('[data-digit],[data-action]') : null;
            if (!btn) return;
            e.preventDefault();
            btn.classList.add('pressed');
            function off() { btn.classList.remove('pressed'); }
            btn.addEventListener('touchend', off, {once:true});
            btn.addEventListener('touchcancel', off, {once:true});
            _dispatchPinBtn(btn);
        }, {passive: false});

        // Click fallback for desktop
        document.getElementById('pinPad').addEventListener('click', function(e) {
            var btn = e.target.closest ? e.target.closest('[data-digit],[data-action]') : null;
            if (!btn) return;
            _dispatchPinBtn(btn);
        });

                function renderPinDots(state = 'normal') {
            for (let i = 0; i < 4; i++) {
                const dot = document.getElementById('dot' + i);
                dot.className = 'pin-dot';
                if (state === 'error') dot.classList.add('error');
                else if (i < _pinEntry.length) dot.classList.add('filled');
            }
        }

        async function checkPin() {
            if (_pinEntry === PIN_CODE) {
                // Correct — auto-login
                renderPinDots('normal');
                try {
                    const r = await fetch('/login', {
                        method: 'POST',
                        headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({username: PIN_USERNAME, password: PIN_PASSWORD})
                    });
                    const data = await r.json();
                    if (data.success) {
                        closePinModal();
                        window.location.href = '/';
                    } else {
                        pinError(data.message || 'Login failed');
                    }
                } catch(err) {
                    pinError('Network error');
                }
            } else {
                pinError('Incorrect PIN');
            }
        }

        function pinError(msg) {
            renderPinDots('error');
            const pad = document.getElementById('pinPad');
            pad.style.animation = 'pinShake 0.4s ease';
            pad.addEventListener('animationend', () => { pad.style.animation = ''; }, {once: true});
            setTimeout(() => {
                _pinEntry = '';
                _pinLocked = false;
                renderPinDots();
            }, 800);
        }
    </script>
</body>
